name: release-publish-crates

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release metadata
        run: python scripts/release_preflight.py

      - name: Package Rust SDK
        run: cargo package --manifest-path rust/crates/mcpstore/Cargo.toml

      - name: Publish Rust SDK
        run: cargo publish --manifest-path rust/crates/mcpstore/Cargo.toml --token "$CRATES_TOKEN"
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
