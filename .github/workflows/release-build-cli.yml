name: release-build-cli

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.platform_id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: darwin
            runner: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_binary: mcpstore
          - platform_id: linux-x64-gnu
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_binary: mcpstore
          - platform_id: linux-arm64-gnu
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_binary: mcpstore
          - platform_id: win32-x64-msvc
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_binary: mcpstore.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release metadata
        shell: bash
        run: python scripts/release_preflight.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build target artifact
        if: matrix.platform_id != 'darwin'
        shell: bash
        run: ./scripts/build_target.sh "${{ matrix.target }}" "${{ matrix.platform_id }}" "${{ matrix.artifact_binary }}"

      - name: Build macOS artifacts
        if: matrix.platform_id == 'darwin'
        shell: bash
        run: |
          ./scripts/build_target.sh aarch64-apple-darwin darwin-arm64 mcpstore
          ./scripts/build_target.sh x86_64-apple-darwin darwin-x64 mcpstore

      - name: Run smoke test
        if: matrix.platform_id != 'darwin'
        shell: bash
        run: ./scripts/smoke_test.sh "dist/${{ matrix.platform_id }}/${{ matrix.artifact_binary }}"

      - name: Run smoke tests on macOS
        if: matrix.platform_id == 'darwin'
        shell: bash
        run: |
          ./scripts/smoke_test.sh dist/darwin-arm64/mcpstore
          ./scripts/smoke_test.sh dist/darwin-x64/mcpstore

      - name: Generate checksums
        if: matrix.platform_id != 'darwin'
        shell: bash
        run: |
          cd "dist/${{ matrix.platform_id }}"
          shasum -a 256 "${{ matrix.artifact_binary }}" > SHA256SUMS

      - name: Generate checksums on macOS
        if: matrix.platform_id == 'darwin'
        shell: bash
        run: |
          (cd dist/darwin-arm64 && shasum -a 256 mcpstore > SHA256SUMS)
          (cd dist/darwin-x64 && shasum -a 256 mcpstore > SHA256SUMS)

      - name: Upload build artifact
        if: matrix.platform_id != 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: mcpstore-${{ matrix.platform_id }}
          path: dist/${{ matrix.platform_id }}/*
          if-no-files-found: error

      - name: Upload macOS arm64 artifact
        if: matrix.platform_id == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: mcpstore-darwin-arm64
          path: dist/darwin-arm64/*
          if-no-files-found: error

      - name: Upload macOS x64 artifact
        if: matrix.platform_id == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: mcpstore-darwin-x64
          path: dist/darwin-x64/*
          if-no-files-found: error

  publish-github-release:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release metadata
        run: python scripts/release_preflight.py

      - name: Download build artifacts
        shell: bash
        run: |
          mkdir -p dist
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            gh run download "${GITHUB_RUN_ID}" --name "mcpstore-${platform}" --dir "dist/${platform}"
          done

      - name: Prepare GitHub Release assets
        run: python scripts/prepare_github_release_assets.py --dist-root dist --assets-dir release-assets

      - name: Attest GitHub Release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: release-assets/*

      - name: Publish GitHub Release assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --generate-notes --verify-tag
          fi
          gh release upload "${tag}" release-assets/* --clobber
