name: post-release-verify

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to verify, without leading v"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify crates.io SDK install path
        run: |
          cargo new --lib /tmp/mcpstore-rust-sdk-check
          cd /tmp/mcpstore-rust-sdk-check
          cargo add mcpstore@"${{ inputs.version }}"
          cargo check

      - name: Verify PyPI SDK import path
        run: |
          python -m pip install "mcpstore==${{ inputs.version }}"
          python -c "import mcpstore; print(mcpstore.__version__)"

      - name: Verify npm CLI path
        run: |
          npm install -g "mcpstore@${{ inputs.version }}"
          mcpstore --version

      - name: Verify curl CLI path
        run: |
          curl -fsSL https://raw.githubusercontent.com/ip2a/mcpstore/main/install.sh | VERSION="${{ inputs.version }}" INSTALL_DIR=/tmp/mcpstore-bin sh
          /tmp/mcpstore-bin/mcpstore --version
